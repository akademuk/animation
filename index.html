<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero — анімація</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="new-banner">
    <div class="new-banner__container">
      <div class="new-banner__left">
        <div class="new-banner__left--1">
          <p><span>Новий</span> <br> лідер</p>
        </div>
        <div class="new-banner__left--2">
          <p>розробки</p>
        </div>
        <div class="new-banner__left--3">
          <p><span>B2B</span> <br> сайтів</p>
        </div>
      </div>
      <div class="new-banner__right">
        <div class="new-banner__right-animation">
          <div class="new-banner__right-animation--iphone">
            <picture>
              <source srcset="mockup-iPhone.webp" type="image/webp">
              <img src="mockup-iPhone.png" width="214" height="439" alt="New Banner iPhone">
            </picture>
          </div>
          <div class="new-banner__right-animation--tablet">
            <picture>
              <source srcset="tablet.webp" type="image/webp">
              <img src="tablet.png" width="403" height="554" alt="New Banner MacBook">
            </picture>
          </div>
        </div>
      </div>
    </div>

    <div class="new-banner__bg">
      <picture>
        <source srcset="banner.webp" type="image/webp">
        <img src="banner.png" width="1920" height="1080" alt="New Banner BG">
      </picture>
    </div>
  </div>

  <div class="new-banner">
    <div class="new-banner__container">
      <div class="new-banner__left">
        <div class="new-banner__left--1">
          <p><span>Новий</span> <br> лідер</p>
        </div>
        <div class="new-banner__left--2">
          <p>розробки</p>
        </div>
        <div class="new-banner__left--3">
          <p><span>B2B</span> <br> сайтів</p>
        </div>
      </div>
      <div class="new-banner__right">
        <div class="new-banner__right-animation">
          <div class="new-banner__right-animation--iphone">
            <picture>
              <source srcset="mockup-iPhone.webp" type="image/webp">
              <img src="mockup-iPhone.png" width="214" height="439" alt="New Banner iPhone">
            </picture>
          </div>
          <div class="new-banner__right-animation--tablet">
            <picture>
              <source srcset="tablet.webp" type="image/webp">
              <img src="tablet.png" width="403" height="554" alt="New Banner MacBook">
            </picture>
          </div>
        </div>
      </div>
    </div>

    <div class="new-banner__bg">
      <picture>
        <source srcset="banner-new.webp" type="image/webp">
        <img src="banner-new.png" width="1920" height="1080" alt="New Banner BG">
      </picture>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>

</html>
